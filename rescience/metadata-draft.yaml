abstract: "We attempt to replicate the core claims of Dadfar (2026), who reports Vocabulary-Activation Correspondence (VAC) during extended self-referential processing in Qwen 2.5-32B-Instruct. Using the author's published configuration and Zenodo data, we identify four obstacles to replication: (1) all published terminal words derive from a degenerate summary mode, not from the intended 1,000-observation runs; (2) spectral power scales superlinearly with generation length (alpha=1.46, R2=0.93), confounding VAC with a length artifact -- after BH-FDR correction, only 4 of 22 partial correlations survive; (3) runs that complete 1,000 observations enter limit cycles, making terminal words phase artifacts; and (4) the TRACE-REPRO code repository targets a different model than the paper's core claims, and contains a circular correspondence test. Cross-model replication on Llama 3.1 70B yields zero compliant baseline runs, confirmed by the original author's own Zenodo deposit. The replication fails: VAC as reported does not survive length correction or cross-model validation."

